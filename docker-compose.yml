version: '3.8'

services:
  grpc-server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: poc-grpc-server
    ports:
      - "50051:50051"
    volumes:
      - ./proto:/usr/src/proto
      - ./server:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      - PORT=50051

  grpc-go-server:
    build:
      context: .
      dockerfile: go-server/Dockerfile
    container_name: poc-grpc-go-server
    ports:
      - "50052:50052"
    environment:
      - PORT=50052

  grpc-client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: poc-grpc-client
    ports:
      - "3000:3000"
    volumes:
      - ./proto:/usr/src/proto
      - ./client:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      - PORT=3000
      - GRPC_SERVER_HOST=grpc-server:50051
      - GRPC_GO_SERVER_HOST=grpc-go-server:50052
    depends_on:
      - grpc-server
      - grpc-go-server
